stages:

  data_acquisition:
    cmd: python src/01_data_acquisition.py
    outs:
      - data/raw

  eda:
    cmd: python src/02_eda.py
    deps:
      - data/raw
      - src/02_eda.py
    outs:
      - outputs/eda

  preprocessing:
    cmd: python src/03_preprocessing.py
    deps:
      - data/raw
      - src/03_preprocessing.py
    outs:
      - data/processed

  split_data:
    cmd: python src/04_train_test_split.py
    deps:
      - data/processed
      - src/04_train_test_split.py
    outs:
      - data/train
      - data/test

  mlsmote:
    cmd: python src/05_mlsmote.py
    deps:
      - data/train
      - src/05_mlsmote.py
    outs:
      - data/balanced

  feature_selection:
    cmd: python src/06_mfo_feature_selection.py
    deps:
      - data/balanced
      - src/06_mfo_feature_selection.py
    outs:
      - outputs/selected_features.csv

  ablation_transfer_function:
    cmd: python src/06b_ablation_transfer.py
    deps:
      - data/balanced
      - src/06b_ablation_transfer.py
    outs:
      - outputs/ablation_transfer

  hyperparameter_tuning:
    cmd: python src/07_hyperparameter_tuning.py
    deps:
      - data/balanced
      - outputs/selected_features.csv
      - src/07_hyperparameter_tuning.py
    outs:
      - outputs/best_params.json

  benchmarking:
    cmd: python src/07_benchmarking.py
    deps:
      - outputs/best_params.json
      - src/07_benchmarking.py
    metrics:
      - outputs/benchmark_metrics.json

  final_evaluation:
    cmd: python src/08_final_evaluation.py
    deps:
      - data/test
      - outputs/best_params.json
      - src/08_final_evaluation.py
    metrics:
      - outputs/final_metrics.json

  threshold_optimization:
    cmd: python src/08b_threshold_optimization.py
    deps:
      - data/test
      - src/08b_threshold_optimization.py
    outs:
      - outputs/thresholds.json

  cross_validation:
    cmd: python src/09_cross_validation.py
    deps:
      - data/train
      - src/09_cross_validation.py
    metrics:
      - outputs/cv_metrics.json

  shap_explainability:
    cmd: python src/10_shap_analysis.py
    deps:
      - models/model.pkl
      - src/10_shap_analysis.py
    outs:
      - outputs/shap

  deployment:
    cmd: python src/11_deployment_export.py
    deps:
      - outputs/thresholds.json
      - src/11_deployment_export.py
    outs:
      - models/final_model.pkl
      - models/final_thresholds.json