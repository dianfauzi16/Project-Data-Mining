stages:
  data_acquisition:
    cmd: python src/01_data_acquisition.py
    deps:
      - src/01_data_acquisition.py
      - Data/raw/Dataset.csv

  exploratory_data_analysis:
    cmd: python src/02_exploratory_data_analysis.py
    deps:
      - Data/raw/Dataset.csv
      - src/02_exploratory_data_analysis.py

  preprocessing:
    cmd: python src/03_data_preprocessing.py
    deps:
      - Data/raw/Dataset.csv
      - src/03_data_preprocessing.py
    outs:
      - Data/processed/cleaned_data.csv

  train_test_split:
    cmd: python src/04_train_test_split.py
    deps:
      - Data/processed/cleaned_data.csv
      - src/04_train_test_split.py
    outs:
      - Data/split/train_data.csv
      - Data/split/test_data.csv

  imbalance_handling:
    cmd: python src/05_multilabel_imbalance_handling.py
    deps:
      - Data/split/train_data.csv
      - src/05_multilabel_imbalance_handling.py
    outs:
      - Data/processed/train_balanced_multilabel.csv

  mfo_feature_selection:
    cmd: python src/06_mfo_feature_selection.py
    deps:
      - Data/processed/train_balanced_multilabel.csv
      - src/06_mfo_feature_selection.py
    outs:
      - Data/processed/train_selected_features.csv

  hyperparameter_tunning:
    cmd: python src/07_hyperparameter_tunning.py
    deps:
      - Data/processed/train_selected_features.csv
      - src/07_hyperparameter_tunning.py
    outs:
      - models/best_xgb_params.json

  final_model_training:
    cmd: python src/11_final_model.py
    deps:
      - Data/processed/train_selected_features.csv
      - Data/split/test_data.csv
      - models/best_xgb_params.json
      - src/11_final_model.py
    outs:
      - models/multilabel_xgboost_classifier_chain.pkl
      - models/optimal_thresholds.json

  performance_evaluation:
    cmd: python src/08_performance_evaluation.py
    deps:
      - models/multilabel_xgboost_classifier_chain.pkl
      - Data/processed/train_selected_features.csv
      - src/08_performance_evaluation.py

  cross_validation:
    cmd: python src/09_cross_validation.py
    deps:
      - models/multilabel_xgboost_classifier_chain.pkl
      - Data/processed/train_selected_features.csv
      - src/09_cross_validation.py

  shap_explainability:
    cmd: python src/10_shap_explainability.py
    deps:
      - models/multilabel_xgboost_classifier_chain.pkl
      - src/10_shap_explainability.py